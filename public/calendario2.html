        ],

    },

};

scheduler.config.event_duration = 60; // Duração mínima de 60 minutos
scheduler.config.readonly = true;
scheduler.config.drag_resize = false;
scheduler.config.drag_move = false;
scheduler.config.dblclick_create = false;
            scheduler.config.xml_date = "%Y-%m-%d %H:%i";

            scheduler.config.hour_date = "%H:%i";
    scheduler.config.time_step = 30;

    scheduler.templates.event_text = function(start, end, event) {
  return `<div style="padding: 5px;">
    <strong>${event.text.split('\n')[0]}</strong><br>
    ${event.text.split('\n').slice(1).join('<br>')}
    <div style="margin-top: 5px; font-size: 0.9em;">
      ${scheduler.templates.event_date(start)} - ${scheduler.templates.event_date(end)}
    </div>
  </div>`;
};

// calendario2.html - Atualização similar
scheduler.templates.event_date = function(date) {
  return date.toLocaleTimeString('pt-BR', { 
    hour: '2-digit', 
    minute: '2-digit',
    hour12: false 
  });
};


scheduler.templates.event_bar_text = function(start, end, event) {
  return event.text.split('\n')[0];
};

    // Habilitar modo de agenda
    scheduler.init('scheduler', new Date(), "week");
    
    // Configurar escala de tempo
    scheduler.config.scale_unit = "hour";
    scheduler.config.scale_size = 60;
    
    // Atualizar a view após carregar eventos
    scheduler.attachEvent("onXLE", function(){  
        scheduler.updateView();
    });
    
            
            // Initialize scheduler
            scheduler.init('scheduler', new Date(), "month");
            scheduler.attachEvent("onEmptyClick", function(date, e){
    if (scheduler.getState().mode === 'month') {
      scheduler.setCurrentView(date, 'day');
      return false;  // cancela qualquer comportamento padrão
    }
    return true;
  });

  // 2) Clique em um evento (aula) na month view
  scheduler.attachEvent("onClick", function(id, e){
    var ev = scheduler.getEvent(id);
    if (ev && scheduler.getState().mode === 'month') {
      scheduler.setCurrentView(ev.start_date, 'day');
      return false;  // evita abrir lightbox de edição
    }
    return true;
  });
            scheduler.config.readonly = true;

            // Event type filtering
            document.getElementById("tipo-evento").addEventListener("change", function() {
                const tipoSelecionado = this.value;
                
                if (tipoSelecionado === "TODOS") {
                    scheduler.filter_events = null;
                    scheduler.updateView();
                    return;
                }

                scheduler.filter_events = function(event) {
                    const tipoEvento = event.tipo ? event.tipo.toUpperCase() : "";
                    return tipoEvento === tipoSelecionado;
                };
                scheduler.updateView();
            });

            carregarDadosUsuario();
            carregarEventos();
            document.getElementById("tipo-evento").addEventListener("change", carregarEventos);
    document.getElementById("calendario").addEventListener("change", carregarEventos);
    document.getElementById("btn-pesquisar").addEventListener("click", carregarEventos);
        });

        async function carregarDadosUsuario() {
    try {
        const response = await fetch('/getUserData');
        if (!response.ok) throw new Error("Não autenticado");
        
        const data = await response.json();
        
        carregarEventos();  // <== CHAMA aqui depois de confirmar usuário logado!
    } catch (error) {
        console.error('Erro ao carregar dados do usuário:', error);
        alert('Erro de autenticação. Faça login novamente.');
        window.location.href = '/';
    }
}

async function carregarEventos() {
  try {
    // 1) Limpa tudo SEMPRE antes de buscar nada
    scheduler.clearAll();

    // 2) Busca eventos "normais"
    const respEv = await fetch('/eventos', { credentials: 'include' });
    if (!respEv.ok) throw new Error('Erro ao buscar eventos');
    const eventos = await respEv.json();

    // 3) Busca registros importados
    const respImp = await fetch('/importado', { credentials: 'include' });
    if (!respImp.ok) throw new Error('Erro ao buscar dados importados');
    const importados = await respImp.json();

    // 4) Formata eventos "normais"
    const evFormatados = eventos.map(ev => ({
      id: ev.id,
      text: ev.text,
      start_date: new Date(ev.start_date),
      end_date:   new Date(ev.end_date),
      color:      ev.color,
      textColor:  ev.textColor,
      tipo:       ev.tipo || "AULA"
    }));

    // 5) Formata registros importados
    const impFormatados = importados.map(item => {
      const dateStr = item.data_atividade;
      const [hIni, mIni] = item.hora_inicio.split(':');
      const [hFim, mFim] = item.hora_fim.split(':');
      const start = new Date(dateStr);
      start.setHours(+hIni, +mIni, 0, 0);
      const end = new Date(dateStr);
      end.setHours(+hFim, +mFim, 0, 0);
      return {
        id:      `imp-${item.id}`,
        text:    `${item.docente}\n${item.nome}${item.descricao ? '\n' + item.descricao : ''}`,
        start_date: start,
        end_date:   end,
        tipo:    item.turno || "IMPORTADO",
        color:   "#228B22",
        textColor: "#fff"
      };
    });

    // 6) Junta e filtra por ID único
    const tudo = [...evFormatados, ...impFormatados];
    const vistos = new Set();
    const unicos = tudo.filter(ev => {
      if (vistos.has(ev.id)) return false;
      vistos.add(ev.id);
      return true;
    });

    // 7) Desenha só os únicos
    scheduler.parse(unicos, "json");

  } catch (error) {
    console.error('Erro ao carregar eventos:', error);
    alert('Erro ao carregar eventos. Faça login novamente.');
    window.location.href = '/';
  }
}



        // Course Loading
        async function carregarCursos() {
            try {
                const response = await fetch('http://localhost:5505/curso');
                if (!response.ok) {
                    throw new Error("Erro ao carregar cursos");
                }
                const cursos = await response.json();

                const selectsCurso = document.querySelectorAll('select[id="curso"]');
                selectsCurso.forEach(select => {
                    select.innerHTML = '<option value="">Selecione um curso</option>';
                    cursos.forEach(curso => {
                        const option = document.createElement('option');
                        option.value = curso.id;
                        option.textContent = curso.nome;
                        select.appendChild(option);
                    });
                });
            } catch (error) {
                console.error('Erro ao carregar cursos:', error);
            }
        }

        // Course Form Submission
        document.getElementById('cursoForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const nomeCurso = document.getElementById('nome').value;

            const response = await fetch('http://localhost:5505/curso', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome: nomeCurso })
            });

            if (response.ok) {
                alert('Curso cadastrado!');
                closeModal('modalCurso');
                carregarCursos();
            } else {
                const errorData = await response.json();
                console.error("Erro ao cadastrar curso:", errorData);
            }
        });

     

        // Turma Form Submission
        document.getElementById('turmaForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const nome = document.getElementById('nomeTurma').value;
            const cursoId = document.getElementById('curso').value;

            const response = await fetch('http://localhost:5505/turma', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, curso_id: cursoId })
            });

            if (response.ok) {
                alert('Turma cadastrada!');
                closeModal('modalTurma');
                carregarTurmas();
            } else {
                const errorData = await response.json();
                console.error("Erro ao cadastrar turma:", errorData);
            }
        });

        // Laboratório Loading
        async function carregarLaboratorios() {
            try {
                const response = await fetch('http://localhost:5505/laboratorio');
                if (!response.ok) throw new Error("Erro ao carregar laboratórios");

                const laboratorio = await response.json();
                const selectLaboratorio = document.getElementById('laboratorio');

                selectLaboratorio.innerHTML = '<option value="">Selecione um laboratório</option>';
                laboratorio.forEach(lab => {
                    const option = document.createElement('option');
                    option.value = lab.id;
                    option.textContent = `Cimatec ${lab.cimatec} - Andar ${lab.andar} - Sala ${lab.sala}`;
                    selectLaboratorio.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar laboratórios:', error);
            }
        }

        // Laboratório Form Submission
        document.getElementById('laboratorioForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const cimatec = document.getElementById('cimatec').value;
            const andar = document.getElementById('andar').value;
            const sala = document.getElementById('sala').value;

            const response = await fetch('http://localhost:5505/laboratorio', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cimatec, andar, sala })
            });

            if (response.ok) {

                closeModal('modalLaboratorio');

            } else {
                const errorData = await response.json();
                console.error("Erro ao cadastrar laboratório:", errorData);
            }

        // Matéria (Subject) Loading
        async function carregarMaterias() {
            try {
                const response = await fetch('http://localhost:5505/materia');
                const materias = await response.json();

                const selectMateria = document.getElementById('materia');
                selectMateria.innerHTML = '<option value="">Selecione uma Matéria</option>';

                materias.forEach(materia => {
                    const option = document.createElement('option');
                    option.value = materia.id;
                    option.textContent = materia.uc;
                    selectMateria.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar matérias:', error);
            }
        }

        // Matéria Form Submission
        document.getElementById('materiaForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const uc = document.getElementById('uc').value;
            const ch = document.getElementById('ch').value;
            const curso_id = document.getElementById('curso').value;

            try {
                const response = await fetch('http://localhost:5505/materia', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uc, ch, curso_id })
                });

                const data = await response.json();
                if (response.ok) {
                    alert(data.message);
                    document.getElementById('materiaForm').reset();
                    closeModal('modalMateria');
                } else {
                    console.error("Erro ao cadastrar matéria:", data.error);
                    alert("Erro ao cadastrar matéria.");
                }
            } catch (error) {
                console.error("Erro ao cadastrar matéria:", error);
            }
        });

        // Aula (Class) Form Submission
        async function enviarAula(event) {
            event.preventDefault();
            let formData = new FormData(document.getElementById("aulaForm"));

            let diasSelecionados = Array.from(document.querySelectorAll('input[name="diasSemana"]:checked'))
                .map(el => el.value);

            let dadosAula = {
                curso_id: formData.get("curso"),
                materia_id: formData.get("materia"),
                turma_id: formData.get("turma"),
                laboratorio_id: formData.get("laboratorio"),
                turno: formData.get("turno"),
                diasSemana: diasSelecionados,
                dataInicio: formData.get("dataInicio")
            };

            if (!dadosAula.curso_id || !dadosAula.materia_id || !dadosAula.turma_id || 
                !dadosAula.laboratorio_id || !dadosAula.turno || dadosAula.diasSemana.length === 0 || !dadosAula.dataInicio) {
                alert("Todos os campos devem ser preenchidos corretamente!");
                return;
            }

            try {
                const response = await fetch("http://localhost:5505/aulas", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dadosAula)
                });

                const data = await response.json();
                if (response.ok) {
                    alert("Aula cadastrada com sucesso!");
                    document.getElementById("aulaForm").reset();
                    closeModal("modalAula");
                } else {
                    console.error("Erro ao cadastrar aula:", data.error);
                    alert("Erro ao cadastrar aula.");
                }
            } catch (error) {
                console.error("Erro ao cadastrar aula:", error);
            }
        }

        // Logout
        function sair() {
            if (confirm("Você tem certeza que deseja sair?")) {
                fetch('http://localhost:5505/', { method: 'POST' })
                    .then(() => {
                        window.location.href = 'home.html';
                    })
                    .catch(error => {
                        console.error('Erro ao sair:', error);
                        alert('Erro ao fazer logout.');
                    });
            }
        }

        // Modal Handling
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Initial Page Load
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("aulaForm").addEventListener("submit", enviarAula);
            scheduler.init('scheduler', new Date(), "month");

            document.getElementById("btn-pesquisar").addEventListener("click", carregarEventos);
document.getElementById("calendario").addEventListener("change", carregarEventos);
document.getElementById("tipo-evento").addEventListener("change", carregarEventos);

            document.getElementById("btnCadastrarTurma").addEventListener('click', carregarCursos);
            document.getElementById("btnCadastrarMateria").addEventListener('click', carregarCursos);
            document.getElementById("btnCadastrarAula").addEventListener('click', () => {
                carregarCursos();
                carregarMaterias();
                carregarTurmas();
                carregarLaboratorios();
            });

            carregarDadosUsuario();
            carregarCursos();
        });
